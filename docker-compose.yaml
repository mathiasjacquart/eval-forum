services:
  api:
    build: ./API
    ports:
      - "8080:80"
    volumes:
      - api_data:/app_output
    environment:
      - MONGO_URI=mongodb://mongodb:27017/forum
      - OUTPUT_PATH=/app_output
    develop:
      watch:
        - action: sync+restart
          path: ./API
          target: /app
          ignore:
            - node_modules/
    depends_on:
      - mongodb
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

volumes:
  mongodb_data:
  api_data:

