services:
  api:
    build: ./API
    ports:
      - "8080:80"
    volumes:
      - app_output:/app_output
    environment:
      - MONGODB_URL=mongodb://root:example@mongodb:27017/?authSource=admin
      - OUTPUT_PATH=/app_output
    develop:
      watch:
        - action: sync+restart
          path: ./API
          target: /app
          ignore:
            - node_modules/
    depends_on:
      - mongodb
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
volumes:
  mongodb_data:
  app_output:
