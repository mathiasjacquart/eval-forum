services:
  api:
    build: ./API
    ports:
      - "3000:80"
    environment:
      - MONGO_URI=mongodb://root:example@mongodb:27017/forum?authSource=admin
    develop:
      watch:
        - action: sync+restart
          path: ./API
          target: /app
          ignore:
            - node_modules/
    depends_on:
      - mongodb
  thread:
    build: ./THREAD
    ports:
      - "80:80"
    environment:
      - API_URL=http://api:80
    depends_on:
      - api
  sender:
    build: ./SENDER
    ports:
      - "8080:8080"
    environment:
      - API_URL=http://api:80
    depends_on:
      - api
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
volumes:
  mongodb_data:
networks:
  eval-net: {}

  